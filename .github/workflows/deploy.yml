name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
  IMAGE_NAME: eventhub-api
  AWS_REGION: us-east-1

jobs:
  pre-deploy:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate deployment
        run: |
          echo "✅ Deployment target: ${{ github.event.inputs.environment || 'production' }}"
          echo "✅ Release tag: ${{ github.ref_name }}"
          echo "✅ Commit: ${{ github.sha }}"

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'Production' }}
    runs-on: ubuntu-latest
    needs: pre-deploy
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://api.eventhub.app

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Get image tag
        id: image
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG=${{ github.ref_name }}
          else
            TAG=${{ github.event.inputs.environment }}-${{ github.sha }}
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "image=${{ steps.login-ecr.outputs.registry }}/eventhub-api:$TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-definition.json
          container-name: eventhub-api
          image: ${{ steps.image.outputs.image }}
          environment-variables: |
            NODE_ENV=${{ github.event.inputs.environment || 'production' }}
            LOG_LEVEL=info

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: eventhub-api-${{ github.event.inputs.environment || 'production' }}
          cluster: eventhub-${{ github.event.inputs.environment || 'production' }}
          wait-for-service-stability: true

      - name: Wait for health checks
        run: |
          echo "⏳ Waiting for service to stabilize..."
          for i in {1..30}; do
            if curl -f https://api.eventhub.app/health > /dev/null 2>&1; then
              echo "✅ Service is healthy"
              exit 0
            fi
            echo "Attempt $i/30..."
            sleep 10
          done
          echo "❌ Service health check failed"
          exit 1

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          # Add your smoke test commands here
          # Example: npm run test:smoke
          echo "✅ Smoke tests passed"

      - name: Notify deployment success
        uses: 8398a7/action-slack@v3
        if: success()
        with:
          status: custom
          custom_payload: |
            {
              text: '✅ Deployment to ${{ github.event.inputs.environment || 'production' }} successful',
              channel: '#deployments',
              attachments: [{
                color: 'good',
                title: 'EventHub API',
                text: `Version: ${{ steps.image.outputs.tag }}\nImage: eventhub-api:${{ steps.image.outputs.tag }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}`,
                footer: 'EventHub CI/CD'
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify deployment failure
        uses: 8398a7/action-slack@v3
        if: failure()
        with:
          status: custom
          custom_payload: |
            {
              text: '❌ Deployment to ${{ github.event.inputs.environment || 'production' }} failed',
              channel: '#deployments',
              attachments: [{
                color: 'danger',
                title: 'EventHub API',
                text: `Version: ${{ steps.image.outputs.tag }}\nCheck logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
                footer: 'EventHub CI/CD'
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ Initiating rollback..."
          # Implement rollback logic here
          # Example: Redeploy previous task definition
          echo "Run: aws ecs update-service --cluster eventhub-production --service eventhub-api-production --force-new-deployment"

  post-deploy:
    name: Post-deployment Tasks
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Notify monitoring
        run: |
          echo "📊 Sending deployment event to monitoring..."
          # Send deployment event to NewRelic, DataDog, etc.

      - name: Update release notes
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ github.ref_name }}',
              name: 'Release ${{ github.ref_name }}',
              body: `## Deployed to ${{ github.event.inputs.environment || 'production' }}\n\n- **Image**: eventhub-api:${{ github.ref_name }}\n- **Environment**: ${{ github.event.inputs.environment || 'production' }}\n- **Commit**: ${{ github.sha }}\n- **Deployed by**: ${{ github.actor }}\n- **Time**: $(date)`,
              draft: false,
              prerelease: false
            }).catch(() => {});
